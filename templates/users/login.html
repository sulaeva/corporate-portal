{% extends 'base.html' %}
{% block title %}Вход в систему{% endblock %}

{% block auth_content %}  <-- ИЗМЕНИЛ ЗДЕСЬ
<div class="auth-header">
    <h2>Вход в систему</h2>
    <p>Введите учетные данные</p>
</div>

<form method="post">
    {% csrf_token %}
    {% if form.errors %}
        <div style="color: #dc3545; font-size: 13px; margin-bottom: 15px; background: #fee2e2; padding: 8px; border-radius: 4px; text-align: left;">
            <i class="bi bi-exclamation-circle me-1"></i> Неверный логин или пароль
        </div>
    {% endif %}

    <label class="form-label-auth">Логин</label>
    <input type="text" name="username" class="form-control-auth" required autofocus placeholder="Введите логин">

    <label class="form-label-auth">Пароль</label>
    <input type="password" name="password" class="form-control-auth" required placeholder="Введите пароль">

    <button type="submit" class="btn-login">Войти</button>
</form>

<div class="auth-footer">
    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
</div>
{% endblock %}
