{% extends 'base.html' %}

{% block title %}Личный кабинет сотрудника{% endblock %}

{% block content %}
<div class="dashboard-container">
    <!-- Заголовок -->
    <div class="page-header mb-4">
        <h1 class="page-title mb-1">Добро пожаловать,
            {% if user.first_name %}
                {{ user.first_name }} {{ user.last_name }}
            {% else %}
                {{ user.username }}
            {% endif %}!
        </h1>
        <p class="text-muted mb-0">Панель управления <strong>Сотрудника</strong>.</p>
    </div>

<style>
    .fs-7 { font-size: 0.75rem; }
    .dashboard-container { max-width: 1400px; margin: 0 auto; }
    .text-primary { color: #1E3A5F !important; }
</style>
{% endblock %}
